<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - PizzaHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col">

        <div class="p-5 text-2xl font-bold border-b border-gray-700">
            🍕 PizzaHub
        </div>

        <nav class="flex-1 p-4 space-y-2 text-sm">

            <a href="/dashboard/" class="block p-2 rounded hover:bg-gray-800">📊 Overview</a>
            <a href="/dashboard/products/" class="block p-2 rounded hover:bg-gray-800">🍕 Products</a>
            <a href="/dashboard/orders/" class="block p-2 rounded hover:bg-gray-800">📦 Orders</a>
            <a href="/dashboard/customers/" class="block p-2 rounded hover:bg-gray-800">👤 Customers</a>
            <a href="/dashboard/coupons/" class="block p-2 rounded hover:bg-gray-800">🏷 Coupons</a>
            <a href="/dashboard/reviews/" class="block p-2 rounded hover:bg-gray-800">⭐ Reviews</a>
            <a href="/dashboard/messages/" class="block p-2 rounded hover:bg-gray-800">✉ Messages</a>

        </nav>

        <div class="p-4 border-t border-gray-700 text-xs text-gray-400">
            Admin Panel v1.0
        </div>

    </aside>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col">

        <!-- TOPBAR -->
        <header class="bg-white shadow px-6 py-4 flex justify-between items-center">

            <h1 class="text-xl font-semibold">{% block title %}Dashboard{% endblock %}</h1>

            <div class="text-sm text-gray-600">
                👋 {{ request.user.username }}
            </div>

        </header>

        <!-- CONTENT -->
        <main class="p-6 overflow-y-auto">

            {% block content %}
            {% endblock %}

        </main>

    </div>

</div>

</body>
</html>
